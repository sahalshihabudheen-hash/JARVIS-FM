<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS FM | The Ultimate Radio Experience</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <meta name="description" content="Listen to unlimited global radio stations for free. Discover local and international frequencies with Cosmic Radio.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CDNs Preconnect -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Hls.js for HLS streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link rel="preload" href="./style.css" as="style">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="logo">
                <img src="/logo.png" alt="JARVIS FM Logo" class="logo-img">
                <span>JARVIS FM</span>
            </div>
            <nav class="nav-links">
                <button class="nav-item active" data-type="home">
                    <i data-lucide="home"></i> Home
                </button>
                <button class="nav-item" data-type="topvote">
                    <i data-lucide="trending-up"></i> Trending
                </button>
                <button class="nav-item" data-type="local">
                    <i data-lucide="map-pin"></i> Nearby Stations
                </button>
                <button class="nav-item" data-type="topclick">
                    <i data-lucide="star"></i> Popular
                </button>
                <button class="nav-item" data-type="islamic">
                    <i data-lucide="moon"></i> Peace & Harmony
                </button>
                <button class="nav-item" data-type="tuner">
                    <i data-lucide="radio"></i> Digital Tuner
                </button>
                <div class="sidebar-divider"></div>
                <button class="nav-item" data-type="history">
                    <i data-lucide="history"></i> Recently Played
                </button>
            </nav>
            <div class="sidebar-divider"></div>
        </aside>

        <!-- Main Content Area -->
        <main class="content">
            <header class="top-bar">
                <div class="search-container glass">
                    <i data-lucide="search"></i>
                    <input type="text" id="station-search" placeholder="Search stations, genres or countries...">
                </div>
                <div class="location-status glass" id="location-indicator">
                    <i data-lucide="globe"></i>
                    <span id="location-text">Detecting Location...</span>
                </div>
            </header>

            <div id="genrePicker" class="genre-picker-container"></div>
            <div id="locationExplorer" class="location-explorer-container"></div>

            <section class="station-grid-container">
                <header class="section-header">
                    <h2 id="section-title">Trending Stations</h2>
                    <span class="section-subtitle" id="section-subtitle">Discover popular streams from around the globe</span>
                </header>
                <div class="station-grid-container" id="station-list">
                    <!-- Skeleton Cards (visible while loading) -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>
        </main>

        <!-- Toast Notification Container -->
        <div id="toast-container"></div>

        <!-- Fixed Player Bar -->
        <footer class="player-bar">
            <div class="player-glow-border"></div>

            <!-- Left: Artwork + Info + Visualizer -->
            <div class="player-left">
                <div class="player-artwork" id="player-artwork">
                    <i data-lucide="radio"></i>
                </div>
                <div class="player-info clickable-expand" id="player-expand-trigger">
                    <div class="live-badge" id="live-status-badge" style="display:none; opacity:0;"><span class="live-dot"></span> LIVE</div>
                    <h4 id="current-station-name">Nothing Playing</h4>
                    <p id="current-station-genre">Select a station to begin</p>
                </div>
                <div class="visualizer-pill" id="visualizer-pill">
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                </div>
            </div>

            <!-- Center: Controls -->
            <div class="player-center">
                <button class="control-btn" id="prev-station" title="Previous">
                    <i data-lucide="skip-back"></i>
                </button>
                <button id="toggle-play" class="play-btn-main" disabled>
                    <i data-lucide="play" id="play-icon"></i>
                </button>
                <button class="control-btn" id="next-station" title="Next">
                    <i data-lucide="skip-forward"></i>
                </button>
            </div>

            <!-- Right: Volume -->
            <div class="player-right">
                <i data-lucide="volume-2" class="volume-icon"></i>
                <div class="volume-slider-wrapper">
                    <div class="volume-progress" id="volume-progress"></div>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <span id="volume-percent">70%</span>
            </div>

            <audio id="audio-player" style="display:none"></audio>
        </footer>

        <!-- Onboarding Modal -->
        <div id="onboarding-modal" class="modal-overlay hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <img src="/logo.png" alt="JARVIS FM" class="modal-logo">
                    <h2>Welcome to JARVIS FM</h2>
                    <p>What kind of music do you vibe with? Pick at least 3.</p>
                </div>
                <div class="genre-selection-grid" id="onboarding-genres">
                    <button class="onboarding-genre" data-tag="pop">Pop</button>
                    <button class="onboarding-genre" data-tag="rock">Rock</button>
                    <button class="onboarding-genre" data-tag="jazz">Jazz</button>
                    <button class="onboarding-genre" data-tag="electronic">EDM</button>
                    <button class="onboarding-genre" data-tag="classical">Classical</button>
                    <button class="onboarding-genre" data-tag="lofi">Lofi</button>
                    <button class="onboarding-genre" data-tag="hiphop">Hip Hop</button>
                    <button class="onboarding-genre" data-tag="relax">Relax</button>
                    <button class="onboarding-genre" data-tag="news">News</button>
                    <button class="onboarding-genre" data-tag="islamic">Islamic</button>
                    <button class="onboarding-genre" data-tag="malayalam">Malayalam</button>
                    <button class="onboarding-genre" data-tag="bollywood">Bollywood</button>
                </div>
                <div class="modal-footer">
                    <button id="finish-onboarding" class="primary-btn" disabled>Start Listening</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Expanded Player Overlay -->
    <div id="expanded-player" class="player-expanded-overlay hidden">
        <button id="close-expanded" class="close-btn"><i data-lucide="chevron-down"></i></button>
        <div class="expanded-bg" id="expanded-bg"></div>
        <div class="expanded-content">
            <div class="expanded-artwork-container">
                <div class="expanded-artwork-glow" id="expanded-artwork-glow"></div>
                <img id="expanded-artwork" src="" alt="Station Artwork">
            </div>
            <div class="expanded-info">
                <span class="now-playing-label">Now Playing</span>
                <h2 id="expanded-name">Nothing Playing</h2>
                <p id="expanded-genre">Select a station</p>
            </div>
            
            <div class="expanded-visualizer">
                <div class="vis-bar" style="height: 20px;"></div>
                <div class="vis-bar" style="height: 40px;"></div>
                <div class="vis-bar" style="height: 30px;"></div>
                <div class="vis-bar" style="height: 50px;"></div>
                <div class="vis-bar" style="height: 25px;"></div>
                <div class="vis-bar" style="height: 45px;"></div>
                <div class="vis-bar" style="height: 35px;"></div>
            </div>

            <div class="expanded-controls">
                <button class="control-btn-lg" id="exp-prev"><i data-lucide="skip-back"></i></button>
                <button class="play-btn-lg" id="exp-toggle-play"><i data-lucide="play" id="exp-play-icon"></i></button>
                <button class="control-btn-lg" id="exp-next"><i data-lucide="skip-forward"></i></button>
            </div>
            
            <div class="expanded-volume">
                <i data-lucide="volume-2"></i>
                <div class="volume-slider-wrapper">
                    <div class="volume-progress" id="exp-volume-progress"></div>
                    <input type="range" id="exp-volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
