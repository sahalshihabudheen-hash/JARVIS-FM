<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS FM | The Ultimate Radio Experience</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <meta name="description" content="Listen to unlimited global radio stations for free. Discover local and international frequencies with Cosmic Radio.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Hls.js for HLS streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="logo">
                <img src="/logo.png" alt="JARVIS FM Logo" class="logo-img">
                <span>JARVIS FM</span>
            </div>
            <nav class="nav-links">
                <button class="nav-item active" data-type="topvote">
                    <i data-lucide="trending-up"></i> Trending
                </button>
                <button class="nav-item" data-type="local">
                    <i data-lucide="map-pin"></i> Nearby Stations
                </button>
                <button class="nav-item" data-type="topclick">
                    <i data-lucide="star"></i> Popular
                </button>
                <button class="nav-item" data-type="islamic">
                    <i data-lucide="moon"></i> Islamic Radio
                </button>
            </nav>
            <div class="sidebar-divider"></div>
            <div class="categories" id="categories-list">
                <span class="category-label">Genres</span>
                <button class="genre-item" data-tag="jazz">Jazz</button>
                <button class="genre-item" data-tag="rock">Rock</button>
                <button class="genre-item" data-tag="pop">Pop</button>
                <button class="genre-item" data-tag="lofi">Lofi</button>
                <button class="genre-item" data-tag="classical">Classical</button>
                <button class="genre-item" data-tag="electronic">Electronic</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content">
            <header class="top-bar">
                <div class="search-container glass">
                    <i data-lucide="search"></i>
                    <input type="text" id="station-search" placeholder="Search stations, genres or countries...">
                </div>
                <div class="location-status glass" id="location-indicator">
                    <i data-lucide="globe"></i>
                    <span id="location-text">Detecting Location...</span>
                </div>
            </header>

            <div class="genre-chips-container" id="genre-chips">
                <button class="chip active" data-tag="trending">All</button>
                <button class="chip" data-tag="malayalam">Malayalam</button>
                <button class="chip" data-tag="islamic">Islamic</button>
                <button class="chip" data-tag="news">News</button>
                <button class="chip" data-tag="pop">Pop</button>
                <button class="chip" data-tag="relax">Relax</button>
            </div>

            <section class="station-grid-container">
                <div class="station-grid" id="station-list">
                    <!-- Stations will be injected here -->
                    <div class="loader-container">
                        <div class="loader"></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Toast Notification Container -->
        <div id="toast-container"></div>

        <!-- Fixed Player Bar -->
        <footer class="player-bar">
            <div class="player-glow-border"></div>

            <!-- Left: Artwork + Info + Visualizer -->
            <div class="player-left">
                <div class="player-artwork" id="player-artwork">
                    <i data-lucide="radio"></i>
                </div>
                <div class="player-info">
                    <div class="live-badge"><span class="live-dot"></span> LIVE</div>
                    <h4 id="current-station-name">Nothing Playing</h4>
                    <p id="current-station-genre">Select a station to begin</p>
                </div>
                <div class="visualizer-pill" id="visualizer-pill">
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                </div>
            </div>

            <!-- Center: Controls -->
            <div class="player-center">
                <button class="control-btn" id="prev-station" title="Previous">
                    <i data-lucide="skip-back"></i>
                </button>
                <button id="toggle-play" class="play-btn-main" disabled>
                    <i data-lucide="play" id="play-icon"></i>
                </button>
                <button class="control-btn" id="next-station" title="Next">
                    <i data-lucide="skip-forward"></i>
                </button>
            </div>

            <!-- Right: Volume -->
            <div class="player-right">
                <i data-lucide="volume-2" class="volume-icon"></i>
                <div class="volume-slider-wrapper">
                    <div class="volume-progress" id="volume-progress"></div>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <span id="volume-percent">70%</span>
            </div>

            <audio id="audio-player" style="display:none"></audio>
        </footer>

        <!-- Onboarding Modal -->
        <div id="onboarding-modal" class="modal-overlay hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <img src="/logo.png" alt="JARVIS FM" class="modal-logo">
                    <h2>Welcome to JARVIS FM</h2>
                    <p>What kind of music do you vibe with? Pick at least 3.</p>
                </div>
                <div class="genre-selection-grid" id="onboarding-genres">
                    <button class="onboarding-genre" data-tag="pop">Pop</button>
                    <button class="onboarding-genre" data-tag="rock">Rock</button>
                    <button class="onboarding-genre" data-tag="jazz">Jazz</button>
                    <button class="onboarding-genre" data-tag="electronic">EDM</button>
                    <button class="onboarding-genre" data-tag="classical">Classical</button>
                    <button class="onboarding-genre" data-tag="lofi">Lofi</button>
                    <button class="onboarding-genre" data-tag="hiphop">Hip Hop</button>
                    <button class="onboarding-genre" data-tag="relax">Relax</button>
                    <button class="onboarding-genre" data-tag="news">News</button>
                    <button class="onboarding-genre" data-tag="islamic">Islamic</button>
                    <button class="onboarding-genre" data-tag="malayalam">Malayalam</button>
                    <button class="onboarding-genre" data-tag="bollywood">Bollywood</button>
                </div>
                <div class="modal-footer">
                    <button id="finish-onboarding" class="primary-btn" disabled>Start Listening</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
